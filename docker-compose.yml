services:
  api:
    build: .
    container_name: irrigation-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./mlruns:/app/mlruns
    environment:
      - MLFLOW_TRACKING_URI=file:/app/mlruns

  frontend:
    build:
      context: ./irrigation_frontend
    container_name: irrigation-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - api

  mlflow:
    image: python:3.11-slim
    container_name: irrigation-mlflow
    working_dir: /mlflow
    command: >
      sh -c "pip install mlflow==2.14.1 &&
             mlflow ui --host 0.0.0.0 --port 5000 --backend-store-uri file:/mlflow/mlruns"
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlflow/mlruns

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: irrigation-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - api

  grafana:
    image: grafana/grafana:11.0.0
    container_name: irrigation-grafana
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
